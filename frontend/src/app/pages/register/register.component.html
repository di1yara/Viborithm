<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"> Viborithm</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join the music community</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Choose a username" class="form-input" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com" class="form-input" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Min 6 characters" class="form-input" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="Repeat password" class="form-input" (keyup.enter)="register()" />
    </div>
    <div class="error-msg" *ngIf="error">{{ error }}</div>
    <div class="success-msg" *ngIf="success">✅ {{ success }}</div>
    <button class="btn-primary" (click)="register()" [disabled]="loading">
      <span *ngIf="!loading">Create Account</span>
      <span *ngIf="loading">Creating...</span>
    </button>
    <p class="auth-footer">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
